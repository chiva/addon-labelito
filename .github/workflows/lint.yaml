# PR/push/nightly lint. The add-on linter is the hassfest-equivalent for add-ons; the wrapper also
# carries custom shell/Python entrypoints and a Dockerfile, so those are linted too.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  addon:
    name: Add-on linter
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2.21
        with:
          path: "./labelito"

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -s bash

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: labelito/Dockerfile

  yamllint:
    name: YAMLlint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run yamllint
        uses: frenck/action-yamllint@v1.5.0
